# Render Blueprint — deploys the Atelio backend (server/) as a free Docker web service.
# Use: render.com → New → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: atelio-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: server
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
